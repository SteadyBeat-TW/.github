name: Feature Request Form
description: File a form to request feature
title: [New feature]
body:
  - type: markdown
    attributes:
      value: |
        Please all necessary field to request new feature!
  - type: input
    id: requester
    attributes:
      label: Requester
      description: Fill out the field with initial requester
      placeholder: ex. George
    validations:
      required: true
  - type: input
    id: due_date
    attributes:
      label: Due Date
      description: Fill out the field with due date when requester wants to have new feature
      placeholder: ex. 2024/7/9. If no due date, please fill out with TBD.
      validations:
        required: true      
  - type: input
    id: summary
    attributes:
      label: Feature summary
      description: Describe the summary for new feature
      placeholder: ex. for friendly use
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: Details
      description: Describe the details, including what and why for new feature
      placeholder: Develop GUI interface for friendly use
    validations:
      required: true
