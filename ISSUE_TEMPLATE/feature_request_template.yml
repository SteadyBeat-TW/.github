name: Feature Request Form
description: 提出新功能需求並選擇是否自動建立分支
title: "[Feature]: "
labels: ["backlog"]
assignees: ["你的GitHub帳號"]

body:
  - type: markdown
    attributes:
      value: |
        ### 填寫需求資訊
        填寫此表單後，系統會自動標記為 backlog 並指派給開發負責人。

  - type: input
    id: requester
    attributes:
      label: 提案人
      description: 請填入您的名字
      placeholder: 例如：George
    validations:
      required: true

  - type: dropdown
    id: create_branch_option
    attributes:
      label: 是否自動建立開發分支？
      description: 若選擇「是」，系統將依據下方的摘要自動建立分支。
      options:
        - "是 (Yes)"
        - "否 (No)"
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: 功能摘要
      description: 簡短英文描述，這會成為分支名稱 (例如：fix-audio-noise)
      placeholder: 例如：add-voice-unlock-feature
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: 需求細節與原因
      description: 請描述為什麼需要這個功能，以及預期達成的目標。
      placeholder: |
        - 痛點：目前的...
        - 目標：希望能達成...
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: 確認事項
      options:
        - label: 我已確認此需求不與現有功能重複
          required: true