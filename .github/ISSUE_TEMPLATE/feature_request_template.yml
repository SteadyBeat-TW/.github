name: Feature Request Form
description: Propose a new feature or improvement
title: "[Feat]: "
labels: ["backlog"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out all necessary fields to request a new feature!
  - type: input
    id: requester
    attributes:
      label: Requester
      description: Who is the primary contact or stakeholder?
      placeholder: ex. George
    validations:
      required: true
  - type: input
    id: due_date
    attributes:
      label: Due Date
      description: Target completion date (YYYY/MM/DD or TBD)
      placeholder: ex. 2026/07/09
    validations:
      required: true
  - type: input
    id: summary
    attributes:
      label: Feature Summary
      description: A concise summary of the request
      placeholder: ex. Improve AIANC processing speed
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: Details (What & Why)
      description: Describe the feature in detail and the reason it is needed
      placeholder: Provide context, use cases, or specific algorithm requirements
    validations:
      required: true