name: Auto Move Issues to In Progress

on:
  schedule:
    - cron: "0 1 * * *" # 每天台灣 09:00 執行
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  projects: write   # ✅ org-level workflow 支援

jobs:
  move-to-inprogress:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @octokit/graphql

      - name: Run automation script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/workflows/move-to-inprogress.js
